{% extends "base.html" %}

{% block content %}

<h1 class="mb-4">Edit Movie</h1>

<form method="POST">
    <div class="mb-3">
        <label class="form-label">Title</label>
        <input type="text" name="title" class="form-control" value="{{ movie.title }}" required>
    </div>

    <div class="mb-3">
        <label class="form-label">Director</label>
        <input type="text" name="director" class="form-control" value="{{ movie.director }}">
    </div>

    <div class="mb-3">
        <label class="form-label">Year</label>
        <input type="number" name="year" class="form-control" value="{{ movie.year }}">
    </div>

    <div class="mb-3">
        <label class="form-label">Genre</label>
        <input type="text" name="genre" class="form-control" value="{{ movie.genre }}">
    </div>

    <div class="mb-3">
        <label class="form-label">Rating</label>
        <input type="number" step="0.1" name="rating" class="form-control" value="{{ movie.rating }}">
    </div>

    <div class="mb-3">
        <label class="form-label">Poster URL</label>
        <input type="text" name="poster_url" class="form-control" value="{{ movie.poster_url }}">
    </div>

    <div class="mb-3">
        <label class="form-label">Description</label>
        <textarea name="description" class="form-control" rows="4">{{ movie.description }}</textarea>
    </div>

    <button type="submit" class="btn btn-primary">Save Changes</button>
    <a href="/movie/{{ movie.id }}" class="btn btn-secondary">Cancel</a>
</form>

{% endblock %}
